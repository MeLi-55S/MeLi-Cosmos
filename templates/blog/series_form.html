{% extends "blog/base.html" %}

{% block title %}新建系列 - Project MyCosmos{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto pt-8">
    <h1 class="text-2xl md:text-3xl font-bold text-slate-100 mb-8 font-mono">📚 新建系列</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-xs font-mono text-slate-400 mb-2">系列名称</label>
            {{ form.name }}
        </div>

        <div>
            <label class="block text-xs font-mono text-slate-400 mb-2">简介（可选）</label>
            {{ form.description }}
        </div>

        <div class="flex items-center gap-4 pt-4 border-t border-slate-900">
            <button type="submit"
                    class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-indigo-500 text-white font-bold rounded-xl hover:opacity-90 transition font-mono text-sm">
                创建系列
            </button>
            <a href="{% url 'series_list' %}"
               class="px-6 py-3 bg-slate-900 border border-slate-800 text-slate-400 rounded-xl hover:text-slate-300 transition font-mono text-sm">
                取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
