{% extends "blog/base.html" %}

{% block title %}注册 - MeLi Cosmos{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-12">
    <div class="bg-white dark:bg-slate-950/60 border border-slate-200 dark:border-slate-700 rounded-2xl p-8 shadow-lg dark:shadow-2xl">
        <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-2 font-mono text-center">🌌 加入 MeLi Cosmos</h2>
        <p class="text-xs text-slate-400 dark:text-slate-400 text-center mb-6">
            MeLi Cosmos 采用邀请制，请输入你获取到的邀请码以继续注册。
        </p>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 p-3 rounded-xl text-xs font-mono {% if message.tags == 'success' %}bg-green-50 dark:bg-green-500/10 border border-green-200 dark:border-green-500/20 text-green-600 dark:text-green-400{% else %}bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
            <div>
                <label for="invite-code-input" class="block text-xs font-mono text-slate-500 dark:text-slate-400 mb-2">邀请码</label>
                <input type="text" name="code" id="invite-code-input" required autofocus
                       class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 text-sm font-mono focus:border-cyan-600 dark:focus:border-cyan-500 focus:ring-1 focus:ring-cyan-600 dark:focus:ring-cyan-500 outline-none transition"
                       placeholder="输入32位邀请码">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-gradient-to-r from-cyan-500 to-indigo-500 text-white font-bold rounded-xl hover:opacity-90 transition font-mono text-sm shadow-lg shadow-cyan-500/10 dark:shadow-lg dark:shadow-cyan-500/20 min-h-[44px]">
                验证邀请码
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 dark:text-slate-400 mt-6 font-mono">
            已有账号？<a href="{% url 'login' %}" class="text-cyan-600 dark:text-cyan-400 hover:text-cyan-700 dark:hover:text-cyan-300">登录</a>
            <span class="mx-2">·</span>
            <a href="{% url 'index' %}" class="text-slate-400 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-300">返回首页</a>
        </p>
    </div>
</div>
{% endblock %}
