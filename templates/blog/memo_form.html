{% extends "blog/base.html" %}

{% block title %}碎碎念 - Project MyCosmos{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto pt-8">
    <h1 class="text-2xl md:text-3xl font-bold text-slate-100 mb-8 font-mono">💬 碎碎念</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div>
            <label for="{{ form.content.id_for_label }}" class="block text-xs font-mono text-slate-400 mb-2">内容</label>
            {{ form.content }}
            {% if form.content.errors %}
            <p class="text-xs text-red-400 mt-1 font-mono">{{ form.content.errors.0 }}</p>
            {% endif %}
        </div>

        <div class="flex items-center space-x-3">
            {{ form.is_public }}
            <label for="{{ form.is_public.id_for_label }}" class="text-xs font-mono text-slate-400">公开</label>
        </div>

        <div class="flex items-center gap-4 pt-4 border-t border-slate-900">
            <button type="submit"
                    class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-indigo-500 text-white font-bold rounded-xl hover:opacity-90 transition font-mono text-sm">
                发布
            </button>
            <a href="{% url 'memo_list' %}"
               class="px-6 py-3 bg-slate-900 border border-slate-800 text-slate-400 rounded-xl hover:text-slate-300 transition font-mono text-sm">
                取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
