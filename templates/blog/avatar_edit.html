{% extends "blog/base.html" %}

{% block title %}修改头像 - MeLi Cosmos{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100 mb-8 font-mono">修改头像</h1>

    {# Current avatar #}
    <div class="mb-6">
        <p class="text-xs font-mono text-slate-500 dark:text-slate-400 mb-3">当前头像</p>
        <img id="current-avatar"
             src="{% if user.profile.avatar %}{{ user.profile.avatar.url }}{% else %}https://api.dicebear.com/7.x/bottts/png?seed={{ user.username }}{% endif %}"
             alt="当前头像"
             class="w-32 h-32 rounded-full object-cover border-2 border-slate-200 dark:border-slate-700">
    </div>

    {# Upload & crop area #}
    <div id="crop-container" class="hidden space-y-4">
        <p class="text-xs font-mono text-slate-500 dark:text-slate-400">拖动图片调整位置</p>
        <div id="crop-viewport"
             class="relative w-64 h-64 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-800 mx-auto cursor-grab select-none border-2 border-dashed border-cyan-400/50 dark:border-cyan-500/30">
            <img id="crop-image" src="" alt="裁剪预览" class="absolute max-w-none pointer-events-none" draggable="false">
        </div>
        <div class="flex items-center justify-center gap-3">
            <button type="button" id="crop-save-btn"
                    class="px-5 py-2.5 bg-gradient-to-r from-cyan-500 to-indigo-500 text-white font-bold rounded-xl hover:opacity-90 transition font-mono text-sm min-h-[44px]">
                保存头像
            </button>
            <button type="button" id="crop-cancel-btn"
                    class="px-4 py-2.5 text-slate-400 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-300 transition font-mono text-sm bg-transparent border-none cursor-pointer">
                取消
            </button>
        </div>
        <p id="crop-status" class="text-xs font-mono text-center hidden"></p>
    </div>

    {# File input #}
    <div class="mt-6">
        <input type="file" id="avatar-file-input" accept="image/*" class="hidden">
        <button type="button" id="select-file-btn"
                class="px-5 py-2.5 text-xs font-mono text-cyan-600 dark:text-cyan-400 hover:bg-cyan-100 dark:hover:bg-cyan-500/10 rounded-xl transition bg-transparent border border-dashed border-cyan-400/50 dark:border-cyan-500/30 cursor-pointer">
            选择新头像
        </button>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700">
        <a href="{% url 'profile_edit' %}"
           class="text-xs font-mono text-slate-400 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-300 transition hover:underline">
            ← 返回编辑资料
        </a>
    </div>
</div>


<script>
(function() {
    var fileInput = document.getElementById('avatar-file-input');
    var selectBtn = document.getElementById('select-file-btn');
    var cropContainer = document.getElementById('crop-container');
    var cropViewport = document.getElementById('crop-viewport');
    var cropImage = document.getElementById('crop-image');
    var saveBtn = document.getElementById('crop-save-btn');
    var cancelBtn = document.getElementById('crop-cancel-btn');
    var statusEl = document.getElementById('crop-status');
    var currentAvatar = document.getElementById('current-avatar');
    var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    var dragState = { x: 0, y: 0, dragging: false, startX: 0, startY: 0 };
    var naturalW = 0, naturalH = 0;
    var viewSize = 256; // matches w-64

    function initCrop(imgSrc) {
        cropImage.src = imgSrc;
        cropImage.onload = function() {
            naturalW = cropImage.naturalWidth;
            naturalH = cropImage.naturalHeight;
            // Scale so the shorter dimension fills the viewport
            var scale = viewSize / Math.min(naturalW, naturalH);
            var w = naturalW * scale;
            var h = naturalH * scale;
            cropImage.style.width = w + 'px';
            cropImage.style.height = h + 'px';
            // Center initially
            dragState.x = (viewSize - w) / 2;
            dragState.y = (viewSize - h) / 2;
            cropImage.style.left = dragState.x + 'px';
            cropImage.style.top = dragState.y + 'px';
            cropContainer.classList.remove('hidden');
        };
    }

    selectBtn.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
        if (!fileInput.files[0]) return;
        if (fileInput.files[0].size > 10 * 1024 * 1024) {
            alert('文件过大，头像图片不能超过 10 MB');
            fileInput.value = '';
            return;
        }
        var reader = new FileReader();
        reader.onload = function(e) { initCrop(e.target.result); };
        reader.readAsDataURL(fileInput.files[0]);
        fileInput.value = '';
    });

    // Drag to reposition
    cropViewport.addEventListener('mousedown', function(e) {
        e.preventDefault();
        dragState.dragging = true;
        dragState.startX = e.clientX - dragState.x;
        dragState.startY = e.clientY - dragState.y;
        cropViewport.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', function(e) {
        if (!dragState.dragging) return;
        dragState.x = e.clientX - dragState.startX;
        dragState.y = e.clientY - dragState.startY;
        // Clamp so image always fills the viewport
        var w = parseInt(cropImage.style.width);
        var h = parseInt(cropImage.style.height);
        dragState.x = Math.min(0, Math.max(viewSize - w, dragState.x));
        dragState.y = Math.min(0, Math.max(viewSize - h, dragState.y));
        cropImage.style.left = dragState.x + 'px';
        cropImage.style.top = dragState.y + 'px';
    });
    window.addEventListener('mouseup', function() {
        dragState.dragging = false;
        cropViewport.style.cursor = 'grab';
    });

    cancelBtn.addEventListener('click', function() {
        cropContainer.classList.add('hidden');
        cropImage.src = '';
    });

    // Save: render crop area to canvas, upload
    saveBtn.addEventListener('click', function() {
        statusEl.classList.remove('hidden', 'text-red-500', 'dark:text-red-400', 'text-cyan-600', 'dark:text-cyan-400');
        statusEl.textContent = '保存中...';
        statusEl.classList.add('text-cyan-600', 'dark:text-cyan-400');

        var canvas = document.createElement('canvas');
        canvas.width = viewSize;
        canvas.height = viewSize;
        var ctx = canvas.getContext('2d');

        var img = new Image();
        img.onload = function() {
            var scaleX = naturalW / parseInt(cropImage.style.width);
            var scaleY = naturalH / parseInt(cropImage.style.height);
            var sx = -dragState.x * scaleX;
            var sy = -dragState.y * scaleY;
            var sw = viewSize * scaleX;
            var sh = viewSize * scaleY;
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, viewSize, viewSize);

            canvas.toBlob(function(blob) {
                var fd = new FormData();
                fd.append('image', blob, 'avatar.png');
                fetch('{% url "avatar_upload_ajax" %}', {
                    method: 'POST', body: fd,
                    headers: { 'X-Requested-With': 'XMLHttpRequest', 'X-CSRFToken': csrfToken }
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        statusEl.textContent = data.error;
                        statusEl.classList.add('text-red-500', 'dark:text-red-400');
                        return;
                    }
                    statusEl.textContent = '头像已更新';
                    statusEl.classList.add('text-green-500', 'dark:text-green-400');
                    currentAvatar.src = data.url + '?t=' + Date.now();
                    cropContainer.classList.add('hidden');
                    cropImage.src = '';
                    setTimeout(function() { statusEl.classList.add('hidden'); }, 2000);
                })
                .catch(function() {
                    statusEl.textContent = '上传失败';
                    statusEl.classList.add('text-red-500', 'dark:text-red-400');
                });
            }, 'image/png');
        };
        img.src = cropImage.src;
    });
})();
</script>
{% endblock %}
