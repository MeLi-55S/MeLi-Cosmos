<nav class="bg-[#050a14]/60 backdrop-blur-xl border-b border-slate-900 sticky top-0 z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
        <a href="{% url 'index' %}" class="text-lg md:text-xl font-bold bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent hover:opacity-80 transition font-mono cursor-pointer">
            🌌 Project MyCosmos
        </a>

        <div class="flex items-center space-x-3 md:space-x-5 text-xs md:text-sm font-mono text-slate-400">

            {# Mobile search toggle #}
            <button onclick="document.getElementById('search-box').classList.toggle('hidden')"
                    class="md:hidden text-slate-400 hover:text-cyan-400 transition text-lg" title="搜索">🔍</button>

            {# Search form #}
            <form id="search-box" method="get" action="{% url 'search' %}" class="hidden md:flex absolute md:static top-16 left-0 w-full md:w-auto bg-[#050a14] md:bg-transparent p-3 md:p-0 border-b border-slate-900 md:border-0 items-center">
                <input type="text" name="q" placeholder="搜索……"
                       class="w-full md:w-28 lg:w-36 bg-slate-900 border border-slate-800 rounded-full px-3 py-1 text-xs text-slate-300 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 transition">
            </form>

            <a href="{% url 'index' %}" class="hover:text-cyan-400 transition">文章</a>
            <a href="{% url 'archives' %}" class="hover:text-cyan-400 transition hidden sm:inline">归档</a>
            <a href="{% url 'series_list' %}" class="hover:text-purple-400 transition hidden sm:inline">系列</a>
            <a href="{% url 'memo_list' %}" class="hover:text-cyan-400 transition inline-flex items-center gap-1">
                状态{% if latest_memo %} <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>{% endif %}
            </a>
            <a href="{% url 'about' %}" class="hover:text-cyan-400 transition hidden sm:inline">关于</a>

            {# RSS Feed link #}
            <a href="{% url 'rss_feed' %}" class="hover:text-amber-400 transition hidden md:inline" title="RSS 订阅">RSS</a>

            {% if user.is_authenticated %}
            <a href="{% url 'post_create' %}" class="text-cyan-400 hover:text-cyan-300 transition" title="写文章">✏️</a>
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="hover:text-red-400 transition font-mono text-xs md:text-sm text-slate-400 bg-transparent border-none cursor-pointer">退出</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="hover:text-cyan-400 transition">登录</a>
            {% endif %}
        </div>
    </div>
</nav>
