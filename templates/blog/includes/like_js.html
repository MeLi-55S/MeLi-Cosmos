{# Shared like-toggle JS. Expects: content_type_key, object_id #}
<script>
(function() {
  var contentType = '{{ content_type_key }}';
  var objectId = {{ object_id }};
  var btn = document.getElementById('like-btn');
  var display = document.getElementById('like-display');
  if (!btn) return;

  btn.addEventListener('click', function() {
    if (btn.dataset.busy === '1') return;
    if (!{{ user.is_authenticated|lower }}) {
      window.location.href = '{% url "login" %}?next={{ request.path|urlencode }}';
      return;
    }
    btn.dataset.busy = '1';
    fetch('{% url "like_toggle_ajax" %}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token }}'
      },
      body: JSON.stringify({content_type: contentType, object_id: objectId})
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) return;
      if (data.liked) {
        btn.classList.add('text-red-500');
        btn.classList.remove('text-slate-400', 'dark:text-slate-500', 'hover:text-red-400');
      } else {
        btn.classList.remove('text-red-500');
        btn.classList.add('text-slate-400', 'dark:text-slate-500', 'hover:text-red-400');
      }
      if (display) display.textContent = data.display_text;
    })
    .catch(function() {})
    .finally(function() { btn.dataset.busy = ''; });
  });
})();
</script>
