<!DOCTYPE html>

<html lang="zh-CN" class="dark">
<head>
    <script>
    // Anti-FOUC: apply stored theme before first paint
    (function() {
        var theme = localStorage.getItem('theme');
        var html = document.documentElement;
        if (theme === 'light') {
            html.classList.remove('dark');
        } else if (theme === 'system' || theme === null) {
            if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                html.classList.remove('dark');
            }
        }
    })();
    </script>

<body class="bg-slate-50 dark:bg-[#050a14] text-slate-700 dark:text-slate-300 antialiased min-h-screen flex flex-col selection:bg-cyan-500/40 selection:text-white">

    {% include "blog/includes/nav.html" %}

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 md:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    {% include "blog/includes/footer.html" %}

    {# 返回顶部按钮 #}
    <button id="back-to-top" aria-label="返回顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    {# 代码复制 + 返回顶部行为 + 主题切换 #}
    <script>
    // 为所有代码块注入复制按钮
    document.querySelectorAll('.codehilite').forEach(function(block) {
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = '复制';
        btn.addEventListener('click', function() {
            var code = block.querySelector('pre').innerText;
            navigator.clipboard.writeText(code).then(function() {
                btn.textContent = '已复制！';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        });
        block.appendChild(btn);
    });

    // 返回顶部按钮可见性
    var btt = document.getElementById('back-to-top');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
            btt.classList.add('visible');
        } else {
            btt.classList.remove('visible');
        }
    });

    // 表单提交防重复：禁用提交按钮 + 显示"提交中..."
    document.addEventListener('submit', function(e) {
        var form = e.target;
        if (form.method.toLowerCase() !== 'post') return;
        var btn = form.querySelector('button[type="submit"]');
        if (!btn || btn.dataset.guarded) return;
        var origText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '提交中...';
        btn.dataset.guarded = '1';
    });

    // ===== Theme Switcher =====
    (function() {
        var html = document.documentElement;

        function getTheme() {
            return localStorage.getItem('theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('theme', theme);
            applyTheme(theme);
            updateUI(theme);
        }

        function applyTheme(theme) {
            if (theme === 'light') {
                html.classList.remove('dark');
            } else if (theme === 'dark') {
                html.classList.add('dark');
            } else {
                if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    html.classList.remove('dark');
                } else {
                    html.classList.add('dark');
                }
            }
        }

        function updateUI(theme) {
            var sun = document.getElementById('theme-icon-sun');
            var moon = document.getElementById('theme-icon-moon');
            var monitor = document.getElementById('theme-icon-monitor');
            if (sun && moon && monitor) {
                sun.classList.add('hidden');
                moon.classList.add('hidden');
                monitor.classList.add('hidden');
                if (theme === 'light') sun.classList.remove('hidden');
                else if (theme === 'dark') moon.classList.remove('hidden');
                else monitor.classList.remove('hidden');
            }
            var label = document.getElementById('theme-label-mobile');
            if (label) {
                var names = { light: '日间', dark: '夜间', system: '系统' };
                label.textContent = '主题：' + (names[theme] || '系统');
            }
        }

        function cycleTheme() {
            var current = getTheme();
            var next = current === 'light' ? 'dark' : current === 'dark' ? 'system' : 'light';
            setTheme(next);
        }

        var btn = document.getElementById('theme-toggle');
        if (btn) btn.addEventListener('click', cycleTheme);

        var btnMobile = document.getElementById('theme-toggle-mobile');
        if (btnMobile) btnMobile.addEventListener('click', cycleTheme);

        var mq = window.matchMedia('(prefers-color-scheme: light)');
        mq.addEventListener('change', function() {
            if (getTheme() === 'system') applyTheme('system');
        });

        updateUI(getTheme());
    })();

    // Quick memo form: Enter to submit, replace newlines with spaces
    (function() {
        var quickForm = document.querySelector('form[action$="memo/create/"]');
        if (quickForm) {
            var qta = quickForm.querySelector('textarea');
            if (qta) {
                qta.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        quickForm.dispatchEvent(new Event('submit', { cancelable: true }));
                    }
                });
            }
            quickForm.addEventListener('submit', function() {
                if (qta) qta.value = qta.value.replace(/\n/g, ' ');
            });
        }
    })();

    // 移动端汉堡菜单 toggle
    var menuToggle = document.getElementById('menu-toggle');
    var mobileMenu = document.getElementById('mobile-menu');
    if (menuToggle && mobileMenu) {
        menuToggle.addEventListener('click', function() {
            var expanded = mobileMenu.classList.toggle('hidden');
            menuToggle.setAttribute('aria-expanded', !expanded);
        });
    }
    </script>
</body>
</html>
